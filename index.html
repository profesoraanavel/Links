<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Anavel · Bienvenido a mi mundo místico</title>
  <meta name="description" content="Anavel — Bienvenido a mi mundo místico." />
  <link rel="icon" href="Anavel Logo No background.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #1a0512;
      --bg-2: #2a0a1e;
      --bg-3: #4a0e2e;
      --gold: #d4a857;
      --gold-bright: #f5d67a;
      --gold-soft: rgba(212, 168, 87, 0.45);
      --cream: #f6ecd6;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--cream);
      background:
        radial-gradient(ellipse at 20% 10%, rgba(212,168,87,0.1), transparent 55%),
        radial-gradient(ellipse at 85% 90%, rgba(122,30,80,0.4), transparent 60%),
        linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 45%, var(--bg-3) 100%);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Star field ─────────────────────── */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        radial-gradient(1px 1px at 12% 18%, var(--gold-bright), transparent 60%),
        radial-gradient(1px 1px at 28% 72%, #fff, transparent 60%),
        radial-gradient(1.5px 1.5px at 47% 35%, var(--gold), transparent 60%),
        radial-gradient(1px 1px at 62% 82%, #fff, transparent 60%),
        radial-gradient(1px 1px at 78% 22%, var(--gold-bright), transparent 60%),
        radial-gradient(1.5px 1.5px at 88% 60%, #fff, transparent 60%),
        radial-gradient(1px 1px at 8%  88%, var(--gold), transparent 60%),
        radial-gradient(1px 1px at 35% 12%, #fff, transparent 60%),
        radial-gradient(1px 1px at 18% 55%, var(--gold-bright), transparent 60%),
        radial-gradient(1px 1px at 52% 8%,  #fff, transparent 60%),
        radial-gradient(1px 1px at 70% 48%, var(--gold), transparent 60%),
        radial-gradient(1px 1px at 92% 30%, #fff, transparent 60%),
        radial-gradient(1px 1px at 5%  38%, var(--gold-bright), transparent 60%);
      animation: twinkle 7s ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      0%   { opacity: .3; }
      50%  { opacity: .9; }
      100% { opacity: .45; }
    }

    /* ── Large background celestials ───── */
    .bg-celestial {
      position: fixed;
      top: 50%;
      pointer-events: none;
      z-index: 1;
      opacity: 0.22;
      filter: drop-shadow(0 0 22px rgba(212,168,87,0.2));
    }
    .bg-sun {
      left: calc(50% - 580px);
      transform: translateY(-52%);
      width: min(48vw, 540px);
      animation: bgFloatSun 14s ease-in-out infinite;
    }
    .bg-moon {
      right: calc(50% - 580px);
      transform: translateY(-48%);
      width: min(48vw, 540px);
      animation: bgFloatMoon 17s ease-in-out infinite;
    }
    @keyframes bgFloatSun {
      0%,100% { transform: translateY(-52%) rotate(0deg); }
      50%      { transform: translateY(-49%) rotate(3deg); }
    }
    @keyframes bgFloatMoon {
      0%,100% { transform: translateY(-48%) rotate(0deg); }
      50%      { transform: translateY(-51%) rotate(-3deg); }
    }

    /* ── Layout ─────────────────────────── */
    main {
      position: relative;
      z-index: 2;
      max-width: 460px;
      margin: 0 auto;
      padding: 60px 24px 56px;
      text-align: center;
    }

    .brand-mark {
      width: 90px;
      height: 90px;
      margin: 0 auto 16px;
      display: block;
      object-fit: contain;
      filter: url(#goldify) drop-shadow(0 4px 16px rgba(0,0,0,0.5));
    }

    /* ── Portrait ───────────────────────── */
    .portrait-wrap {
      position: relative;
      width: 220px;
      height: 220px;
      margin: 0 auto 30px;
    }
    .portrait-wrap::before {
      content: "";
      position: absolute;
      inset: -28%;
      background: radial-gradient(circle, rgba(245,214,122,0.42) 0%, rgba(245,214,122,0.08) 50%, transparent 72%);
      filter: blur(16px);
      animation: halo 5s ease-in-out infinite alternate;
      z-index: -1;
    }
    @keyframes halo {
      0%   { opacity: .5;  transform: scale(.94); }
      100% { opacity: 1;   transform: scale(1.1); }
    }
    .portrait {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      object-position: 50% 28%;
      border: 2px solid var(--gold);
      box-shadow:
        0 0 0 6px rgba(26,5,18,.7),
        0 0 0 7px rgba(212,168,87,.5),
        0 18px 40px rgba(0,0,0,.55);
    }
    .portrait-frame {
      position: absolute;
      width: 248px;
      height: 248px;
      top: 50%;
      left: 50%;
      pointer-events: none;
      color: var(--gold-bright);
      opacity: .8;
      animation: spin 90s linear infinite;
    }
    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* ── Text ───────────────────────────── */
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(1.75rem, 6vw, 2.5rem);
      line-height: 1.15;
      margin: 0 0 8px;
      color: var(--gold-bright);
      letter-spacing: .02em;
      text-shadow: 0 0 28px rgba(245,214,122,.35);
    }

    .divider {
      width: 80px; height: 1px;
      margin: 0 auto 32px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      position: relative;
    }
    .divider::after {
      content: "✦";
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-55%);
      color: var(--gold-bright);
      background: var(--bg-2);
      padding: 0 8px;
      font-size: .85rem;
    }

    /* ── Link buttons ───────────────────── */
    .links { display: flex; flex-direction: column; gap: 14px; }

    .link {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 22px;
      border-radius: 14px;
      background: rgba(26,5,18,.55);
      border: 1px solid var(--gold-soft);
      color: var(--cream);
      text-decoration: none;
      font-weight: 500;
      font-size: 1rem;
      letter-spacing: .04em;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: transform .25s, border-color .25s, box-shadow .25s, background .25s;
      position: relative; overflow: hidden;
    }
    .link::before {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(245,214,122,.18) 50%, transparent 70%);
      transform: translateX(-110%);
      transition: transform .7s ease;
    }
    .link:hover {
      transform: translateY(-2px);
      border-color: var(--gold-bright);
      background: rgba(74,14,46,.65);
      box-shadow: 0 10px 28px rgba(0,0,0,.45), 0 0 0 1px rgba(245,214,122,.25);
    }
    .link:hover::before { transform: translateX(110%); }
    .link svg { flex-shrink:0; width:22px; height:22px; color:var(--gold-bright); }
    .link span { flex:1; text-align:center; padding-right:22px; }

    footer {
      margin-top: 48px;
      font-family: 'Cinzel', serif;
      font-size: .72rem;
      letter-spacing: .4em;
      text-indent: .4em;
      color: var(--gold-soft);
    }

    @media (max-width: 480px) {
      main { padding-top: 60px; }
      .portrait-wrap { width:184px; height:184px; }
      .brand-mark { width:72px; height:72px; }
      .bg-sun  { left: -18vw;  width: 68vw; opacity: .15; }
      .bg-moon { right: -18vw; width: 68vw; opacity: .15; }
    }

    @media (prefers-reduced-motion: reduce) {
      .stars,.bg-sun,.bg-moon,.portrait-wrap::before { animation: none; }
    }
  </style>
</head>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // Build a gold-tinted favicon using the same feColorMatrix math as #goldify
    (function () {
      const img = new Image();
      img.onload = function () {
        const size = 64;
        const c = document.createElement('canvas');
        c.width = c.height = size;
        const ctx = c.getContext('2d');
        ctx.drawImage(img, 0, 0, size, size);
        const id = ctx.getImageData(0, 0, size, size);
        const px = id.data;
        for (let i = 0; i < px.length; i += 4) {
          // Desaturate to luminance (matches feColorMatrix type="saturate" values="0")
          const l = px[i] * 0.2126 + px[i + 1] * 0.7152 + px[i + 2] * 0.0722;
          // Remap to gold (matches the matrix: highlights → #f5d67a)
          px[i]     = l * 0.961;
          px[i + 1] = l * 0.839;
          px[i + 2] = l * 0.478;
          // alpha (px[i+3]) unchanged
        }
        ctx.putImageData(id, 0, 0);
        document.querySelector('link[rel="icon"]').href = c.toDataURL('image/png');
      };
      img.src = 'Anavel Logo No background.png';
    })();
  </script>
